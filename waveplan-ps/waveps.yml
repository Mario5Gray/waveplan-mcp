# Example waveplan-ps configuration.
#
# plan/state/journal/note inputs are now explicit file paths only.
# Supply them with CLI flags:
#   --plan /abs/path/to/*-execution-waves.json
#   --state /abs/path/to/*-execution-state.json
#   --journal /abs/path/to/*-execution-journal.json
#
# Or via environment:
#   WAVEPLAN_PLAN
#   WAVEPLAN_STATE
#   WAVEPLAN_JOURNAL
#
# log_dirs remain directory roots because SWIM step logs are many files.

log_dirs:
  # Recursively loads SWIM step logs under this root.
  # Log filenames must look like:
  #   S2_T8.1_implement.1.stdout.log
  #   S2_T8.1_implement.1.stderr.log
  - ../docs/plans/.waveplan

display:
  # Defaults to true when omitted. Explicit false is preserved.
  expand_first_wave: true
