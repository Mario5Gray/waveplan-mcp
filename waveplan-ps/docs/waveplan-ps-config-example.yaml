# Example waveplan-ps configuration.
#
# plan/state/journal/note inputs are explicit file paths only.
# Pass them with CLI flags or environment variables:
#   --plan /path/to/*-execution-waves.json
#   --state /path/to/*-execution-state.json
#   --journal /path/to/*-execution-journal.json
#
#   WAVEPLAN_PLAN
#   WAVEPLAN_STATE
#   WAVEPLAN_JOURNAL
#
# log_dirs remain directory roots because SWIM emits many log files.

log_dirs:
  # Recursively loads SWIM step logs under this root.
  # Log filenames must look like:
  #   S2_T8.1_implement.1.stdout.log
  #   S2_T8.1_implement.1.stderr.log
  - ../docs/plans/.waveplan

display:
  # Defaults to true when omitted. Explicit false is preserved.
  expand_first_wave: true
